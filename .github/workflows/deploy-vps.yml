name: Deploy to VPS (Production)

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Create deployment bundle
        run: |
          mkdir -p deploy

          cp -r .next/standalone/* deploy/
          cp -r .next deploy/
          cp -r public deploy/ || true
          cp -r prisma deploy/

          cp package.json deploy/
          cp package-lock.json deploy/

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Trust VPS
        env:
          HOST: ${{ secrets.HOST }}
          PORT: ${{ secrets.PORT || '22' }}
        run: |
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts

      - name: Upload files
        env:
          HOST: ${{ secrets.HOST }}
          USER: ${{ secrets.USER }}
          PORT: ${{ secrets.PORT || '22' }}
        run: |
          rsync -az --delete \
            -e "ssh -p $PORT" \
            deploy/ \
            "$USER@$HOST:/opt/apps/pickaso/"

      - name: Deploy
        env:
          HOST: ${{ secrets.HOST }}
          USER: ${{ secrets.USER }}
          PORT: ${{ secrets.PORT || '22' }}
        run: |
          ssh -p "$PORT" "$USER@$HOST" << EOF
            set -e

            export DATABASE_URL="$DATABASE_URL"

            cd /opt/apps/pickaso

            sudo systemctl restart pickaso
          EOF